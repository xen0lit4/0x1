<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XENOLITH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Anton', Impact, 'Arial Narrow', sans-serif;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: flex-end;
    }
    .link {
      display: block;
      text-decoration: none;
      color: #e6e6e6;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: clamp(22px, 6vw, 28px);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.1s;
      line-height: 1.1;
      white-space: nowrap;
    }
    .link:hover { color: #d60202; }
    .link:active { opacity: 0.4; }
  </style>
</head>
<body>
  <nav class="links">
    <a class="link" id="l1" href="https://xenolith.eu" target="_blank" rel="noopener">WEBSITE</a>
    <a class="link" id="l2" href="https://instagram.com/new__grid" target="_blank" rel="noopener">INSTAGRAM</a>
    <a class="link" id="l3" href="https://soundcloud.com/xenolith" target="_blank" rel="noopener">SOUNDCLOUD</a>
  </nav>
</body>
</html>
