<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9f9f7;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem 4rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e0;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #1a1a18;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #888;
      margin-bottom: 8px;
    }

    .sep { height: 1px; background: #f0f0ee; margin: 1.25rem 0; }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
      color: #1a1a18;
    }
    input[type="text"]:focus { border-color: #888; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .row4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .col  { display: flex; flex-direction: column; gap: 6px; }

    .color-wrap { display: flex; align-items: center; gap: 8px; }

    input[type="color"] {
      width: 34px; height: 34px;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      padding: 2px;
      background: #fff;
    }

    .mono { font-size: 12px; font-family: monospace; color: #888; }

    .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }

    .preset-btn {
      padding: 6px 12px;
      font-size: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #1a1a18;
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s;
    }
    .preset-btn:hover { background: #f5f5f3; }

    .style-btn {
      padding: 8px 0;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #1a1a18;
      cursor: pointer;
      text-align: center;
      transition: background .12s;
    }
    .style-btn:hover { background: #f5f5f3; }
    .style-btn.active {
      background: #f0f0ee;
      border-color: #aaa;
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #333;
      margin-top: 4px;
    }

    .upload-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border: 1px dashed #ccc;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #888;
      transition: background .12s;
    }
    .upload-label:hover { background: #f5f5f3; }

    .logo-preview-row {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    #logo-thumb {
      width: 32px; height: 32px;
      object-fit: contain;
      border: 1px solid #e5e5e0;
      border-radius: 6px;
    }

    #logo-name { font-size: 13px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #qr-output {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 1.75rem;
      gap: 1rem;
    }

    #qr-placeholder {
      width: 256px; height: 256px;
      border: 1px dashed #ccc;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #bbb;
    }

    #qr-canvas { display: none; border-radius: 8px; }

    button {
      padding: 9px 22px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
      color: #1a1a18;
      transition: background .12s;
    }
    button:hover { background: #f5f5f3; }
    button:active { transform: scale(0.98); }

    #dl-btn { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>QR code generator</h1>

    <p class="section-label">URL or text</p>
    <input type="text" id="qr-input" placeholder="https://yoursite.com" />

    <div class="sep"></div>

    <p class="section-label">Colors</p>
    <div class="row2" style="margin-bottom:12px">
      <div class="col">
        <span style="font-size:13px;color:#888">Foreground</span>
        <div class="color-wrap">
          <input type="color" id="fg-color" value="#000000" />
          <span class="mono" id="fg-label">#000000</span>
        </div>
      </div>
      <div class="col">
        <span style="font-size:13px;color:#888">Background</span>
        <div class="color-wrap">
          <input type="color" id="bg-color" value="#ffffff" />
          <span class="mono" id="bg-label">#ffffff</span>
        </div>
      </div>
    </div>

    <div class="presets">
      <button class="preset-btn" data-fg="#000000" data-bg="#ffffff">Classic</button>
      <button class="preset-btn" data-fg="#1a1a2e" data-bg="#e8f4f8">Ocean</button>
      <button class="preset-btn" data-fg="#2d6a4f" data-bg="#d8f3dc">Forest</button>
      <button class="preset-btn" data-fg="#6d23b6" data-bg="#f3e8ff">Grape</button>
      <button class="preset-btn" data-fg="#c1121f" data-bg="#fff0f0">Cherry</button>
      <button class="preset-btn" data-fg="#ffffff" data-bg="#1a1a1a">Dark</button>
    </div>

    <div class="sep"></div>

    <p class="section-label">Dot style</p>
    <div class="row3" style="margin-bottom:12px">
      <button class="style-btn active" data-style="square">Square</button>
      <button class="style-btn" data-style="round">Round</button>
      <button class="style-btn" data-style="dot">Dot</button>
    </div>

    <p class="section-label">Corner style</p>
    <div class="row2" style="margin-bottom:12px">
      <button class="style-btn active" data-corner="square">Square</button>
      <button class="style-btn" data-corner="round">Round</button>
    </div>

    <div class="sep"></div>

    <p class="section-label">Size: <span id="size-out">256</span>px</p>
    <input type="range" id="qr-size" min="128" max="512" step="32" value="256" style="margin-bottom:12px" />

    <p class="section-label">Error correction</p>
    <div class="row4" style="margin-bottom:6px">
      <button class="style-btn" data-ec="L">L</button>
      <button class="style-btn" data-ec="M">M</button>
      <button class="style-btn active" data-ec="Q">Q</button>
      <button class="style-btn" data-ec="H">H</button>
    </div>
    <p style="font-size:12px;color:#bbb;margin-bottom:4px">Higher = more resilient but denser. Use H when adding a logo.</p>

    <div class="sep"></div>

    <p class="section-label">Center logo (optional)</p>
    <label class="upload-label">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
        <path d="M8 2v8M5 5l3-3 3 3M2 12h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <span id="upload-name">Upload image...</span>
      <input type="file" id="logo-input" accept="image/*" style="display:none" />
    </label>
    <div class="logo-preview-row" id="logo-preview-row">
      <img id="logo-thumb" alt="logo preview" />
      <span id="logo-name"></span>
      <button id="logo-clear" style="padding:4px 10px;font-size:12px">Remove</button>
    </div>

    <div id="qr-output">
      <div id="qr-placeholder">QR code will appear here</div>
      <canvas id="qr-canvas"></canvas>
      <button id="dl-btn">Download PNG</button>
    </div>
  </div>

  <script>
    const input      = document.getElementById('qr-input');
    const fgPicker   = document.getElementById('fg-color');
    const bgPicker   = document.getElementById('bg-color');
    const sizePicker = document.getElementById('qr-size');
    const sizeOut    = document.getElementById('size-out');
    const fgLabel    = document.getElementById('fg-label');
    const bgLabel    = document.getElementById('bg-label');
    const placeholder= document.getElementById('qr-placeholder');
    const canvas     = document.getElementById('qr-canvas');
    const dlBtn      = document.getElementById('dl-btn');
    const logoInput  = document.getElementById('logo-input');

    let dotStyle    = 'square';
    let cornerStyle = 'square';
    let ecLevel     = 'Q';
    let logoImg     = null;

    function drawRoundedRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function isFinderPattern(r, c, n) {
      return (r < 7 && c < 7) || (r < 7 && c >= n - 7) || (r >= n - 7 && c < 7);
    }

    function getMatrix(text, ec) {
      const qr = qrcode(0, ec);
      qr.addData(text);
      qr.make();
      const n = qr.getModuleCount();
      const m = [];
      for (let r = 0; r < n; r++) {
        m[r] = [];
        for (let c = 0; c < n; c++) m[r][c] = qr.isDark(r, c);
      }
      return m;
    }

    function generate() {
      const text = input.value.trim();
      const size = parseInt(sizePicker.value);
      const fg   = fgPicker.value;
      const bg   = bgPicker.value;

      if (!text) {
        placeholder.style.display = 'flex';
        canvas.style.display = 'none';
        dlBtn.style.display = 'none';
        return;
      }

      placeholder.style.display = 'none';

      let matrix;
      try { matrix = getMatrix(text, ecLevel); } catch(e) { return; }

      const n        = matrix.length;
      const margin   = Math.round(size * 0.04);
      const cellSize = (size - margin * 2) / n;

      canvas.width  = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, size, size);

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = fg;

      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          if (!matrix[r][c]) continue;
          const x = margin + c * cellSize;
          const y = margin + r * cellSize;
          const isFinder = isFinderPattern(r, c, n);

          if (isFinder) {
            if (cornerStyle === 'round') {
              drawRoundedRect(ctx, x + 0.5, y + 0.5, cellSize - 1, cellSize - 1, cellSize * 0.35);
              ctx.fill();
            } else {
              ctx.fillRect(x, y, cellSize, cellSize);
            }
          } else {
            if (dotStyle === 'square') {
              ctx.fillRect(x + 0.5, y + 0.5, cellSize - 1, cellSize - 1);
            } else if (dotStyle === 'round') {
              drawRoundedRect(ctx, x + 1, y + 1, cellSize - 2, cellSize - 2, cellSize * 0.3);
              ctx.fill();
            } else {
              ctx.beginPath();
              ctx.arc(x + cellSize / 2, y + cellSize / 2, cellSize * 0.38, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }
      }

      if (logoImg) {
        const logoSize = size * 0.18;
        const lx  = (size - logoSize) / 2;
        const ly  = (size - logoSize) / 2;
        const pad = logoSize * 0.08;
        ctx.fillStyle = bg;
        drawRoundedRect(ctx, lx - pad, ly - pad, logoSize + pad * 2, logoSize + pad * 2, 8);
        ctx.fill();
        ctx.drawImage(logoImg, lx, ly, logoSize, logoSize);
      }

      canvas.style.display = 'block';
      dlBtn.style.display  = 'inline-block';
    }

    let debounce;
    input.addEventListener('input',      () => { clearTimeout(debounce); debounce = setTimeout(generate, 350); });
    fgPicker.addEventListener('input',   () => { fgLabel.textContent = fgPicker.value; generate(); });
    bgPicker.addEventListener('input',   () => { bgLabel.textContent = bgPicker.value; generate(); });
    sizePicker.addEventListener('input', () => { sizeOut.textContent = sizePicker.value; generate(); });

    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        fgPicker.value = btn.dataset.fg;
        bgPicker.value = btn.dataset.bg;
        fgLabel.textContent = btn.dataset.fg;
        bgLabel.textContent = btn.dataset.bg;
        generate();
      });
    });

    document.querySelectorAll('[data-style]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-style]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        dotStyle = btn.dataset.style;
        generate();
      });
    });

    document.querySelectorAll('[data-corner]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-corner]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        cornerStyle = btn.dataset.corner;
        generate();
      });
    });

    document.querySelectorAll('[data-ec]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-ec]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        ecLevel = btn.dataset.ec;
        generate();
      });
    });

    logoInput.addEventListener('change', () => {
      const file = logoInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        logoImg = new Image();
        logoImg.onload = () => generate();
        logoImg.src = e.target.result;
        document.getElementById('logo-thumb').src = e.target.result;
        document.getElementById('logo-name').textContent = file.name;
        document.getElementById('upload-name').textContent = 'Change image...';
        document.getElementById('logo-preview-row').style.display = 'flex';
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('logo-clear').addEventListener('click', () => {
      logoImg = null;
      logoInput.value = '';
      document.getElementById('logo-preview-row').style.display = 'none';
      document.getElementById('upload-name').textContent = 'Upload image...';
      generate();
    });

    dlBtn.addEventListener('click', () => {
      const a = document.createElement('a');
      a.download = 'qrcode.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  </script>
</body>
</html>
