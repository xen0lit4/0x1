<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>disruption</title>
  <meta name="description" content="DISRUPTION" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,400;0,700;1,100;1,400&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0908;
      --line: #3d392e;
      --line-bright: #4a4438;
      --fg: #E8D9C4;
      --fg-dim: #72643d;

      --accent-start: #af6a3b;
      --accent-mid:   #8f603a;
      --accent-end:   #72643d;
      --gradient: linear-gradient(135deg, #af6a3b, #8f603a, #72643d, #3d392e);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: 'IBM Plex Mono', monospace;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: crosshair;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 480px;
      padding: 60px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- TITLE ---- */
    .title-block {
      text-align: center;
      margin-bottom: 64px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 15vw, 100px);
      letter-spacing: 0.04em;
      line-height: 1;
      display: block;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ---- LINKS ---- */
    .section-label {
      width: 100%;
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--fg-dim);
      text-transform: uppercase;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }

    .links {
      list-style: none;
      width: 100%;
    }

    .links li {
      border-bottom: 1px solid var(--line);
      opacity: 0;
      animation: fadein 0.5s ease forwards;
    }

    .links li:nth-child(1) { animation-delay: 0.05s; }
    .links li:nth-child(2) { animation-delay: 0.13s; }
    .links li:nth-child(3) { animation-delay: 0.21s; }
    .links li:nth-child(4) { animation-delay: 0.29s; }
    .links li:nth-child(5) { animation-delay: 0.37s; }
    .links li:nth-child(6) { animation-delay: 0.45s; }
    .links li:nth-child(7) { animation-delay: 0.53s; }
    .links li:nth-child(8) { animation-delay: 0.61s; }

    @keyframes fadein {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .links a {
      display: grid;
      grid-template-columns: 1fr 64px 16px;
      align-items: center;
      padding: 20px 0;
      text-decoration: none;
      color: var(--fg);
      gap: 12px;
    }

    .links a:hover .platform-name {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .links a:hover .platform-tag {
      border-color: var(--accent-start);
      color: var(--accent-start);
    }

    .links a:hover .link-arrow {
      transform: translateX(4px);
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .platform-index {
      font-size: 9px;
      color: var(--fg-dim);
      letter-spacing: 0.1em;
      min-width: 18px;
    }

    .platform-name {
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .platform-tag {
      font-size: 8px;
      letter-spacing: 0.18em;
      color: var(--fg-dim);
      border: 1px solid var(--line-bright);
      padding: 3px 9px;
      text-transform: uppercase;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      text-align: center;
    }

    .link-arrow {
      font-size: 11px;
      color: var(--fg-dim);
      transition: transform 0.15s;
      text-align: right;
    }

    /* ---- FOOTER ---- */
    footer {
      width: 100%;
      border-top: 1px solid var(--line);
      padding: 10px 24px;
      display: flex;
      justify-content: center;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--fg-dim);
      text-transform: uppercase;
    }

    /* ---- CURSOR BLINK ---- */
    .blink {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--gradient);
      vertical-align: middle;
      margin-left: 3px;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

  <main>
