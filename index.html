<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XENOLITH</title>
  <link rel="icon" type="image/x-icon" href="_assets/WebIcon_Black_BG.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Roboto+Mono:wght@200;300&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:      #060606;
      --fg:      #edecec;
      --red:     #e40404;
      --display: 'Barlow Condensed', sans-serif;
      --mono:    'Roboto Mono', monospace;
      --pad-x:   48px;
      --vh100:   100dvh;
    }
    @supports not (height: 100dvh) { :root { --vh100: 100svh; } }
    @supports not (height: 100svh) { :root { --vh100: 100vh; } }

    html, body { height: 100%; overflow: hidden; background: #000; }
    body { color: var(--fg); font-family: var(--display); font-weight: 300; overflow-x: hidden; }
    @media (pointer: fine) { body { cursor: none; } }

    #scroll-root {
      height: var(--vh100);
      overflow-y: scroll; overflow-x: hidden;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      position: relative; z-index: 3; background: transparent;
    }
    #scroll-root::-webkit-scrollbar { display: none; }
    #scroll-root { scrollbar-width: none; }

    /* ─── INTRO ── */
    #intro-screen {
      position: fixed; inset: 0; background: #000;
      z-index: 99999;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; overflow: hidden;
    }
    #intro-screen.hidden {
      opacity: 0; pointer-events: none;
      transition: opacity 0.9s cubic-bezier(0.4,0,0.2,1);
    }
    #intro-slide-1 {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
    }
    #intro-text {
      position: relative; z-index: 2;
      font-family: 'Roboto Mono', monospace; font-weight: 300;
      font-size: clamp(8px, 1.6vw, 22px); letter-spacing: 0.15em;
      text-transform: uppercase; text-align: center; line-height: 1;
    }
    .intro-bar {
      position: absolute; bottom: 0; left: 0; height: 1px; width: 0%;
      background: linear-gradient(to right, transparent, var(--red), transparent);
    }
    #intro-slide-2 {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.7s ease; pointer-events: none;
    }
    #intro-slide-2.visible { opacity: 1; }
    #intro-tagline {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 300;
      font-size: clamp(14px, 2vw, 26px); letter-spacing: 0.18em;
      text-transform: lowercase; text-align: center;
      color: rgba(237,236,236,0.75); max-width: 600px; line-height: 2;
    }
    #intro-tagline .blink-red {
      color: #000; background-color: var(--red);
      padding: 0 3px; font-weight: 700;
      animation: blinkRedBg 1.1s step-start infinite;
    }
    @keyframes blinkRedBg {
      0%,49%  { background-color: var(--red); color: #000; }
      50%,100%{ background-color: transparent; color: #000; }
    }

    /* ─── CURSOR ── */
    .cursor {
      position: fixed; width: 7px; height: 7px; background: #fff;
      border-radius: 50%; pointer-events: none; z-index: 999999;
      transition: transform 0.15s ease, opacity 0.3s ease;
      transform: translate(-50%,-50%); opacity: 1;
    }
    .cursor.expand   { transform: translate(-50%,-50%) scale(2); opacity: 0.92; }
    .cursor.invisible{ opacity: 0 !important; }
    @media (pointer: coarse) { .cursor { display: none !important; } }

    /* ─── VIDEO ── */
    #hero-video {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: var(--vh100);
      object-fit: cover; object-position: center;
      z-index: 2; pointer-events: none;
    }
    .hero-vignette {
      position: fixed; inset: 0; z-index: 4; pointer-events: none;
      background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
    }
    #hero-video::-webkit-media-controls,
    #hero-video::-webkit-media-controls-panel,
    #hero-video::-webkit-media-controls-play-button,
    #hero-video::-webkit-media-controls-start-playback-button { display: none !important; }
    #scroll-fade { display: none; }

    /* ─── SCROLL ARROW ── */
    #scroll-arrow {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 6px;
      opacity: 1; transition: opacity 0.4s ease; pointer-events: none;
    }
    #scroll-arrow.hidden { opacity: 0; }
    .arrow-chevron {
      width: 14px; height: 14px;
      border-right: 1.5px solid rgba(237,236,236,0.55);
      border-bottom: 1.5px solid rgba(237,236,236,0.55);
      transform: rotate(45deg);
      animation: arrowBlink 1.4s ease-in-out infinite;
    }
    @keyframes arrowBlink {
      0%,100%{ opacity: 0.7; } 50%{ opacity: 0.15; }
    }

    /* ─── HERO ── */
    #hero {
      height: var(--vh100); scroll-snap-align: start;
      scroll-snap-stop: always; background: transparent; flex-shrink: 0;
    }

    /* ─── WORKS ── */
    #works {
      position: relative; z-index: 6; display: flex; flex-direction: column;
      background: transparent; padding: 72px var(--pad-x) 0;
      scroll-snap-align: start; scroll-snap-stop: always; flex-shrink: 0;
    }
    .works-header { margin-bottom: 40px; text-align: center; }
    .works-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 3px; width: 100%; }
    .work-card { position: relative; aspect-ratio: 4/3; overflow: hidden; background: #111; }
    @media (pointer: fine) { .work-card { cursor: none; } }
    .work-card-thumb {
      width: 100%; height: 100%; background-size: cover; background-position: center;
      filter: grayscale(40%) brightness(0.6); transition: filter 0.3s ease;
    }
    .work-card:hover .work-card-thumb { filter: grayscale(20%) brightness(0.75); }
    .work-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
      display: flex; flex-direction: column; justify-content: flex-end; padding: 22px;
    }
    .work-card-title {
      font-family: 'Major Mono Display', monospace; font-weight: 400;
      font-size: 14px; letter-spacing: 0.08em; text-transform: lowercase; color: #fff;
      text-shadow: 0 0 12px rgba(0,0,0,1), 0 2px 8px rgba(0,0,0,1);
    }
    .work-card-num {
      font-family: 'Roboto Mono', monospace; font-size: 10px;
      letter-spacing: 0.3em; color: rgba(255,255,255,0.7);
      margin-bottom: 6px; text-shadow: 0 0 8px rgba(0,0,0,1);
    }

    /* ─── CONTACT ── */
    .works-contact {
      padding: 72px 0 calc(72px + env(safe-area-inset-bottom,0px));
      display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 48px;
    }
    .qr-link {
      font-family: var(--display); font-weight: 400; font-size: 15px;
      letter-spacing: 0.3em; text-transform: lowercase; color: #fff;
      text-decoration: none; transition: color 0.2s;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }
    @media (pointer: fine) { .qr-link { cursor: none; } }
    .qr-link:hover { color: var(--red); }

    /* ─── REVEAL ── */
    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: none; }

    /* ─── MODAL ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 10000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .overlay-close {
      position: absolute; top: 32px; right: 40px;
      font-family: var(--display); font-weight: 300; font-size: 12px;
      letter-spacing: 0.2em; color: rgba(237,236,236,0.5); transition: color 0.2s;
    }
    @media (pointer: fine) { .overlay-close { cursor: none; } }
    .overlay-close:hover { color: var(--fg); }
    .overlay-inner { width: 90%; max-width: 900px; display: flex; flex-direction: column; gap: 24px; }
    .overlay-video iframe { width: 100%; aspect-ratio: 16/9; border: none; }
    .overlay-desc {
      font-family: var(--display); font-weight: 300; font-size: 18px;
      line-height: 1.8; color: rgba(237,236,236,0.75);
    }
    .overlay-desc .hl {
      color: #000; background-color: var(--red); padding: 0 3px;
      font-weight: 700; animation: blinkRedBg 1.1s step-start infinite;
    }

    /* ─── AUDIO TOGGLE — z-index above intro screen (99999) ── */
    #audio-toggle {
      position: fixed; bottom: 30px; right: 30px;
      z-index: 100000;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; padding: 0;
      opacity: 0; transition: opacity 0.5s ease;
      pointer-events: none;
    }
    #audio-toggle.visible { opacity: 1; pointer-events: all; }
    @media (pointer: fine) { #audio-toggle { cursor: none; } }
    #audio-toggle svg { display: block; transition: opacity 0.2s; }
    #audio-toggle:hover svg { opacity: 0.55; }

    /* ─── MOBILE ── */
    @media (max-width: 900px) {
      :root { --pad-x: 24px; }
      .works-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- INTRO -->
  <div id="intro-screen">
    <div id="intro-slide-1">
      <div id="intro-text">########</div>
      <div class="intro-bar" id="intro-bar"></div>
    </div>
    <div id="intro-slide-2">
      <p id="intro-tagline"></p>
    </div>
  </div>

  <!-- CURSOR -->
  <div class="cursor" id="cursor"></div>

  <!-- BACKGROUND VIDEO — unmuted; its audio is the main-page soundtrack -->
  <video
    id="hero-video"
    autoplay loop playsinline
    webkit-playsinline
    disablePictureInPicture
    x-webkit-airplay="deny"
    preload="auto"
  >
    <source src="_assets/background.mp4" type="video/mp4">
  </video>

  <div class="hero-vignette"></div>
  <div id="scroll-fade"></div>

  <!-- SCROLL ARROW -->
  <div id="scroll-arrow"><div class="arrow-chevron"></div></div>

  <!-- SCROLL ROOT -->
  <div id="scroll-root">
    <section id="hero"></section>
    <section id="works">
      <div class="works-header reveal"></div>
      <div class="works-grid" id="worksGrid"></div>
      <div class="works-contact reveal" id="contact">
        <a class="qr-link" href="/qr" target="_blank">Links</a>
        <a class="qr-link" href="mailto:contact@xenolith.eu">Contact</a>
      </div>
    </section>
  </div>

  <!-- MODAL -->
  <div class="overlay" id="overlay">
    <div class="overlay-close" id="overlayClose">[ close ]</div>
    <div class="overlay-inner">
      <div class="overlay-video" id="overlayVideo"></div>
      <div class="overlay-desc"  id="overlayDesc"></div>
    </div>
  </div>

  <!-- AUDIO TOGGLE -->
  <div id="audio-toggle">
    <svg id="icon-on" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
         fill="none" stroke="rgba(237,236,236,0.65)" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    <svg id="icon-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
         fill="none" stroke="rgba(237,236,236,0.3)" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round" style="display:none;">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <line x1="23" y1="9" x2="17" y2="15"/>
      <line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
  </div>

  <script>
    /* ══════════════════════════════════════════════════════════════
       AUDIO PHILOSOPHY
       ─────────────────
       Playback is ALWAYS started automatically. The toggle only
       controls volume (mute / unmute). If autoplay is blocked by
       the browser, we still call play() — the audio runs silently
       at volume 0 in the background. The user sees the speaker icon
       and can unmute; when they do, volume simply ramps up.

       INTRO  → main.mp3 plays, heroVideo.volume = 0
       TRANSITION (4.5 s into tagline) → mp3 fades out, video fades in
       MAIN   → heroVideo loops; crossfade at loop seam kills click
       MODAL open  → video ducks to 20 %
       YT play btn → video mutes to 0
       MODAL close → video restores
    ══════════════════════════════════════════════════════════════ */

    const heroVideo   = document.getElementById('hero-video');
    const audioToggle = document.getElementById('audio-toggle');
    const iconOn      = document.getElementById('icon-on');
    const iconOff     = document.getElementById('icon-off');

    let phase     = 'intro';  // 'intro' | 'main'
    let userMuted = false;    // only volume preference; never stops playback
    let modalOpen = false;

    /* ── video loop crossfade ── */
    let videoDuration = 0;
    let loopFading    = false;
    const LOOP_XFADE  = 0.5; // seconds

    /* ════ generic ramp ════ */
    function fadeTo(target, obj, duration, onDone) {
      const diff  = target - obj.volume;
      const steps = Math.max(Math.round(duration * 60), 1);
      const step  = diff / steps;
      let count   = 0;
      ;(function tick() {
        count++;
        obj.volume = Math.min(Math.max(obj.volume + step, 0), 1);
        if (count < steps) { requestAnimationFrame(tick); }
        else { obj.volume = target; if (onDone) onDone(); }
      })();
    }

    function updateIcon(on) {
      iconOn.style.display  = on ? 'block' : 'none';
      iconOff.style.display = on ? 'none'  : 'block';
    }

    /* ════ VIDEO LOOP CROSSFADE ════ */
    heroVideo.addEventListener('loadedmetadata', () => {
      videoDuration = heroVideo.duration;
    });

    heroVideo.addEventListener('timeupdate', () => {
      if (phase !== 'main' || modalOpen || videoDuration === 0 || loopFading) return;
      const remaining = videoDuration - heroVideo.currentTime;
      if (remaining <= LOOP_XFADE) {
        loopFading = true;
        fadeTo(0, heroVideo, remaining, () => {
          const poll = setInterval(() => {
            if (heroVideo.currentTime < LOOP_XFADE) {
              clearInterval(poll);
              const target = userMuted ? 0 : 1;
              fadeTo(target, heroVideo, LOOP_XFADE, () => { loopFading = false; });
            }
          }, 16);
        });
      }
    });

    /* ════ TOGGLE — volume only, never touches playback ════ */
    audioToggle.addEventListener('click', () => {
      userMuted = !userMuted;
      updateIcon(!userMuted);

      if (phase === 'intro') {
        /* ramp mp3 volume; it keeps playing regardless */
        fadeTo(userMuted ? 0 : 1, introAudio, 0.4);
      } else {
        if (!modalOpen && !loopFading) {
          fadeTo(userMuted ? 0 : 1, heroVideo, 0.4);
        } else if (modalOpen) {
          /* in modal: duck level when on, 0 when muted */
          fadeTo(userMuted ? 0 : 0.2, heroVideo, 0.4);
        }
      }
    });

    /* Show toggle right away — above intro screen via z-index */
    audioToggle.classList.add('visible');
    updateIcon(true); // assume playing until we know otherwise

    /* ════ INTRO AUDIO ════ */
    const introAudio   = new Audio('_assets/main.mp3');
    introAudio.loop    = false;
    introAudio.volume  = 0;
    introAudio.preload = 'auto';

    /* Keep video silent during intro */
    heroVideo.volume = 0;
    heroVideo.muted  = false;

    function startIntroAudio() {
      introAudio.currentTime = 0;
      /* Always call play() — if browser blocks it we still have the
         audio node running. Volume is at 0 so nothing is heard yet.
         We then ramp volume to 1 regardless; on blocked browsers the
         promise rejects but play() was already attempted.           */
      const p = introAudio.play();
      /* Ramp volume up — this is what the user actually hears */
      fadeTo(1, introAudio, 1.4);
      updateIcon(true);

      if (p && typeof p.then === 'function') {
        p.catch(() => {
          /* Browser blocked autoplay. Audio is "playing" silently
             (volume already ramping but blocked). Show muted icon
             so the user knows they can unmute.                    */
          introAudio.volume = 0;
          userMuted = true;
          updateIcon(false);
          /* Don't retry playback on interaction — just let the toggle
             control volume. The play() call below inside the ramp will
             be re-attempted automatically by some browsers on first
             gesture; for others the user taps the toggle to unmute,
             which ramps volume without needing to call play() again
             because the Audio node is already "playing" at vol 0.  */
        });
      }
    }

    /* ════ TRANSITION: mp3 out → video in ════ */
    function transitionToMainAudio() {
      phase = 'main';
      fadeTo(0, introAudio, 1.0, () => {
        introAudio.pause();
        introAudio.currentTime = 0;
      });
      /* Always start video audio; volume reflects user preference */
      heroVideo.play().catch(() => {});
      fadeTo(userMuted ? 0 : 1, heroVideo, 1.0);
    }

    /* ════ VIDEO PLAYBACK (visual loop — must keep running always) ════ */
    function attemptVideoPlay() {
      heroVideo.play().catch(() => {
        /* Visual video blocked — retry on first gesture */
        const r = () => {
          heroVideo.play().catch(() => {});
          document.removeEventListener('touchstart', r);
          document.removeEventListener('click',      r);
        };
        document.addEventListener('touchstart', r, { once: true, passive: true });
        document.addEventListener('click',      r, { once: true });
      });
    }
    if (heroVideo.readyState >= 2) { attemptVideoPlay(); }
    else { heroVideo.addEventListener('canplay', attemptVideoPlay, { once: true }); }

    /* ════ INTRO ANIMATION ════ */
    const introEl     = document.getElementById('intro-text');
    const introBar    = document.getElementById('intro-bar');
    const introScreen = document.getElementById('intro-screen');
    const slide1      = document.getElementById('intro-slide-1');
    const slide2      = document.getElementById('intro-slide-2');
    const taglineEl   = document.getElementById('intro-tagline');

    const TARGET = 'XENOLITH', CHARS = '#@$%!&*^?~<>|/\\+-=', DURATION = 3200;
    let startTime = null;

    function lerpColor(r1,g1,b1,r2,g2,b2,t) {
      return [Math.round(r1+(r2-r1)*t), Math.round(g1+(g2-g1)*t), Math.round(b1+(b2-b1)*t)];
    }
    const CR = [228,4,4], CW = [237,236,236];

    function scrambleTick(now) {
      if (!startTime) {
        startTime = now;
        if (introAudio.readyState >= 2) { startIntroAudio(); }
        else { introAudio.addEventListener('canplay', startIntroAudio, { once: true }); }
      }
      const t       = Math.min((now - startTime) / DURATION, 1);
      const [r,g,b] = lerpColor(CR[0],CR[1],CR[2],CW[0],CW[1],CW[2], t);
      const col     = `rgb(${r},${g},${b})`;
      const colDim  = `rgba(${r},${g},${b},0.22)`;
      const ss      = Math.round(4 + (1-t)*18);
      const so      = (0.9 - t*0.5).toFixed(2);
      introEl.style.textShadow  = `0 0 ${ss}px rgba(${r},${g},${b},${so}),0 0 ${ss*3}px rgba(${r},${g},${b},${(so*0.4).toFixed(2)})`;
      introEl.style.color       = col;
      introBar.style.width      = (t*100)+'%';
      introBar.style.background = `linear-gradient(to right,transparent,${col},transparent)`;
      introBar.style.boxShadow  = `0 0 8px rgba(${r},${g},${b},0.6)`;
      let html = '';
      for (let i = 0; i < TARGET.length; i++) {
        const lockAt = (i/(TARGET.length-1))*0.85;
        if      (t >= lockAt+0.12) { html += `<span style="color:${col}">${TARGET[i]}</span>`; }
        else if (t >= lockAt)      { const fc=(t-lockAt)/0.12; const ch=Math.random()<fc?TARGET[i]:CHARS[Math.floor(Math.random()*CHARS.length)]; html+=`<span style="color:${col}">${ch}</span>`; }
        else                       { html += `<span style="color:${colDim}">${CHARS[Math.floor(Math.random()*CHARS.length)]}</span>`; }
      }
      introEl.innerHTML = html;
      if (t < 1) { requestAnimationFrame(scrambleTick); }
      else {
        introEl.innerHTML        = TARGET;
        introEl.style.color      = `rgb(${CW[0]},${CW[1]},${CW[2]})`;
        introEl.style.textShadow = '0 0 6px rgba(237,236,236,0.3)';
        introBar.style.width     = '100%';
        setTimeout(showTagline, 520);
      }
    }
    requestAnimationFrame(scrambleTick);

    function showTagline() {
      slide1.style.transition = 'opacity 0.6s ease';
      slide1.style.opacity    = '0';
      taglineEl.innerHTML =
        'xenolith is an artist collective focused on the intersection of&nbsp;' +
        '<span class="blink-red">music</span>' +
        ',&nbsp;<span class="blink-red">video</span>' +
        ', and&nbsp;<span class="blink-red">experience</span>.';
      setTimeout(() => slide2.classList.add('visible'), 400);
      setTimeout(() => transitionToMainAudio(), 4500);
      setTimeout(() => {
        introScreen.classList.add('hidden');
        setTimeout(() => { introScreen.style.display = 'none'; }, 950);
      }, 5500);
    }

    /* ════ WORKS ════ */
    const worksData = [
      {
        title: 'Red Dreams',
        thumbnail: '_assets/reddreams.jpg',
        youtube: 'https://www.youtube.com/embed/CcBfQrdjxkk',
        description: `We created the music and sound design for "<span class="hl">Red Dreams</span>". Each tone is <span class="hl">raw</span>, <span class="hl">vague</span> and <span class="hl">enigmatic</span>. The result is an experimental soundscape, simple yet open to endless interpretation.`
      },
      {
        title: 'The Last Of Us',
        thumbnail: '_assets/TheLastOfUsPreview.png',
        youtube: 'https://www.youtube.com/embed/-JO-2nbI2G8',
        description: `This is the alternative soundtrack we made for the TV series <span class="hl">The Last of Us</span>. The raw sound of the guitar and voice capture the atmosphere, recorded as if echoing a real-life moment from the series. <span class="hl">The song was recorded in an abandoned house in Toronto, Ontario</span>.`
      }
    ];

    const grid = document.getElementById('worksGrid');
    worksData.forEach((work, i) => {
      const card = document.createElement('div');
      card.className = 'work-card reveal';
      card.style.transitionDelay = `${i*0.08}s`;
      card.innerHTML = `<div class="work-card-thumb" style="background-image:url('${work.thumbnail}')"></div><div class="work-card-overlay"><div class="work-card-num">0${i+1}</div><div class="work-card-title">${work.title}</div></div>`;
      if (work.youtube) card.addEventListener('click', () => openOverlay(work.youtube, work.description));
      grid.appendChild(card);
    });

    /* ════ MODAL ════ */
    const overlay      = document.getElementById('overlay');
    const overlayVideo = document.getElementById('overlayVideo');
    const overlayDesc  = document.getElementById('overlayDesc');
    const overlayClose = document.getElementById('overlayClose');

    function openOverlay(yt, desc) {
      modalOpen = true;
      if (!userMuted) fadeTo(0.2, heroVideo, 0.4);
      overlayDesc.innerHTML = `<p>${desc}</p>`;
      overlay.classList.add('open');
      overlayVideo.innerHTML = `
        <div id="yt-placeholder" style="width:100%;aspect-ratio:16/9;background:#111;display:flex;align-items:center;justify-content:center;cursor:pointer;">
          <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="36" fill="rgba(0,0,0,0.55)"/>
            <polygon points="28,20 56,36 28,52" fill="rgba(255,255,255,0.85)"/>
          </svg>
        </div>`;
      document.getElementById('yt-placeholder').addEventListener('click', () => {
        if (!userMuted) fadeTo(0, heroVideo, 0.4);
        overlayVideo.innerHTML = `<iframe src="${yt}?autoplay=1" frameborder="0"
          allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
          allowfullscreen></iframe>`;
      }, { once: true });
    }

    function closeOverlay() {
      modalOpen = false;
      overlay.classList.remove('open');
      overlayVideo.innerHTML = '';
      if (!userMuted) fadeTo(1, heroVideo, 0.5);
    }

    overlayClose.addEventListener('click', closeOverlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });

    /* ════ CURSOR ════ */
    const cursor = document.getElementById('cursor');
    if (window.matchMedia('(pointer: fine)').matches) {
      let idleTimer = null;
      function resetIdle() {
        cursor.classList.remove('invisible');
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => cursor.classList.add('invisible'), 1000);
      }
      document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX+'px';
        cursor.style.top  = e.clientY+'px';
        resetIdle();
      });
      document.addEventListener('mouseleave', () => { cursor.classList.add('invisible'); clearTimeout(idleTimer); });
      document.addEventListener('mouseenter', resetIdle);
      document.querySelectorAll('a,.work-card,.overlay-close,.qr-link,#audio-toggle').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('expand'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('expand'));
      });
      resetIdle();
    }

    /* ════ SCROLL ════ */
    const scrollRoot  = document.getElementById('scroll-root');
    const scrollFade  = document.getElementById('scroll-fade');
    const heroEl      = document.getElementById('hero');
    const scrollArrow = document.getElementById('scroll-arrow');
    scrollRoot.addEventListener('scroll', () => {
      scrollFade.style.opacity = Math.min(scrollRoot.scrollTop / heroEl.offsetHeight, 1);
      scrollArrow.classList.toggle('hidden', scrollRoot.scrollTop > 40);
    });

    /* ════ REVEAL ════ */
    const revealObs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { root: scrollRoot, threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));
  </script>
</body>
</html>
