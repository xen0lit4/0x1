<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Anton', Impact, 'Arial Narrow', sans-serif;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .link {
      display: block;
      text-decoration: none;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: clamp(22px, 6vw, 28px);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.1s;
      line-height: 1.1;
      white-space: nowrap;
    }
    .link:hover { color: #ff0000; }
    .link:active { opacity: 0.4; }

    /* ---- ADJUST THESE VALUES TO MOVE EACH LINE ---- */
    #l1 { padding-left: 8ch; } /* SPOTIFY      */
    #l2 { padding-left: 2.6ch; }   /* APPLE MUSIC  */
    #l3 { padding-left: 0ch; }   /* YOUTUBE MUSIC — anchor */
    #l4 { padding-left: 0ch; }   /* SOUNDCLOUD   */
    #l5 { padding-left: 0ch; }   /* OTHER        */
    /* ----------------------------------------------- */
  </style>
</head>
<body>
  <nav class="links">
    <a class="link" id="l1" href="#" target="_blank" rel="noopener">SPOTIFY</a>
    <a class="link" id="l2" href="#" target="_blank" rel="noopener">APPLE MUSIC</a>
    <a class="link" id="l3" href="#" target="_blank" rel="noopener">YOUTUBE MUSIC</a>
    <a class="link" id="l4" href="#" target="_blank" rel="noopener">SOUNDCLOUD</a>
    <a class="link" id="l5" href="#" target="_blank" rel="noopener">OTHER</a>
  </nav>
</body>
</html>
